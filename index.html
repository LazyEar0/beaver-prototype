<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beaver - 流程编排平台</title>
  <meta name="description" content="Beaver 流程编排平台 - 企业级工作流编排管理系统" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./src/style.css" />
  <link rel="stylesheet" href="./src/designer.css" />
</head>
<body>
  <div class="app-shell" id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <span class="sidebar-brand">Beaver</span>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">管理</div>
          <div class="nav-item active" id="navWorkspace" onclick="switchModule('workspace')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            <span>空间管理</span>
          </div>
          <div class="nav-item" id="navDatasource" onclick="switchModule('datasource')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/></svg>
            <span>数据源管理</span>
          </div>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-footer-text">&copy; 2025 DidaTravel 道旅科技</div>
      </div>
    </aside>

    <!-- Main Area -->
    <div class="main-area">
      <!-- Header -->
      <header class="header">
        <div class="header-left">
          <nav class="breadcrumb" id="breadcrumb">
            <span class="breadcrumb-item current">空间管理</span>
          </nav>
        </div>
        <div class="header-right">
          <button class="header-icon-btn" title="搜索" onclick="showToast('info','全局搜索','该功能将在后续版本中实现')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          </button>
          <button class="header-icon-btn" title="帮助" onclick="showToast('info','帮助中心','该功能将在后续版本中实现')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
          </button>
          <button class="header-icon-btn" title="通知" style="position:relative;" onclick="showToast('info','通知中心','该功能将在后续版本中实现')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
            <span style="position:absolute;top:6px;right:6px;width:6px;height:6px;background:var(--md-error);border-radius:50%;"></span>
          </button>
          <button class="header-icon-btn" title="设置" onclick="showToast('info','系统设置','该功能将在后续版本中实现')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
          <div class="header-user">
            <div class="header-avatar">W</div>
            <span class="header-username">Sukey Wu</span>
          </div>
        </div>
      </header>

      <!-- Content -->
      <main class="content" id="mainContent">
        <!-- Pages rendered here by JS -->
      </main>
    </div>
  </div>

  <!-- Designer Shell (Full-Screen Overlay) -->
  <div class="designer-shell" id="designerShell"></div>

  <!-- Modal Container -->
  <div class="modal-overlay" id="modalContainer"></div>
  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="./src/app.js"></script>
  <script src="./src/designer.js"></script>
</body>
</html>
